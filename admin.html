<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель администратора</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        .btn-action { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Управление бронированиями</h1>
    <table id="adminTable">
        <thead>
            <tr>
                <th>Клиент</th>
                <th>Даты</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="bookingsBody">
            </tbody>
    </table>

    <script>
        // Получение данных с сервера
        async function loadBookings() {
            const response = await fetch('/api/bookings');
            const data = await response.json();
            const tbody = document.getElementById('bookingsBody');
            tbody.innerHTML = data.map(b => `
                <tr>
                    <td>${b.name} ${b.surname}</td>
                    <td>${b.date_in} - ${b.date_out}</td>
                    <td>${b.status}</td>
                    <td>
                        <button class="btn-action" onclick="updateStatus(${b.id}, 'approved')">Одобрить</button>
                        <button class="btn-action" onclick="updateStatus(${b.id}, 'rejected')">Отклонить</button>
                    </td>
                </tr>
            `).join('');
        }

        // Обновление статуса на сервере
        async function updateStatus(id, status) {
            await fetch('/api/bookings/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, status})
            });
            loadBookings();
        }

        loadBookings();
    </script>
</body>
</html>
